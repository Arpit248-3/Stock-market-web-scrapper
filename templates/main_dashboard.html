<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockScraper | Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

  <header class="dashboard-header">
    <div class="brand">
      <h1>StockScraper <span>Pro</span></h1>
    </div>
    <div class="header-actions">
      <button id="themeToggle" class="theme-toggle" title="Switch Theme">🌙</button>
      
      <span style="font-weight: 600;">Welcome, {{ user }}</span>
      
      <a href="{{ url_for('logout') }}" class="btn-outline">Logout</a>
    </div>
  </header>

  <div class="container">
    
    {% include '_nav.html' with context %}
    
    <h2 class="page-title">📊 Analytics Dashboard</h2>

    <section class="controls-bar card">
      
      <div class="control-group">
        <label for="stockSelect">Select Stock</label>
        <select id="stockSelect" class="input-field">
          {% for name, ticker in stock_options.items() %}
            <option value="{{ ticker }}">{{ name }} ({{ ticker }})</option>
          {% endfor %}
        </select>
      </div>

      <span class="divider-text">OR</span>

      <div class="control-group">
        <label for="tickerSearch">Search Ticker (e.g., INFY.NS)</label>
        <input type="text" id="tickerSearch" class="input-field" placeholder="Enter Ticker Symbol">
      </div>
      
      <div class="control-group">
        <label for="timePeriodSelect">Time Period</label>
        <select id="timePeriodSelect" class="input-field">
          <option value="1y">1 Year</option>
          <option value="6mo">6 Months</option>
          <option value="3mo">3 Months</option>
          <option value="1mo">1 Month</option>
          <option value="5d">5 Days</option>
        </select>
      </div>

      <div class="control-group">
        <label for="chartType">Chart Type</label>
        <select id="chartType" class="input-field">
          <option value="line">Line Chart</option>
          <option value="area">Area Chart</option>
          <option value="candlestick">Candlestick Chart</option>
        </select>
      </div>

      <button id="loadDataBtn" class="btn-primary" style="margin-top: 0;">Analyse Stock</button>

    </section>

    <section class="dashboard-grid">
      
      <div class="card info-card" style="grid-column: 1 / -1;">
        <h3 class="analysis-header" id="chartTitle">Price Analysis</h3>
        <div id="stockChart">
          <p id="chartPlaceholder" style="text-align: center; color: var(--text-muted); padding: 50px;">
            Please select a stock and click "Analyse Stock" to view data.
          </p>
        </div>
      </div>

      <div class="card">
        <h3 class="analysis-header">Market Intelligence</h3>
        <div id="stockDetails">
          <p style="color: var(--text-muted); text-align: center; padding: 20px 0;">
            Data will appear here...
          </p>
        </div>
      </div>

      <div class="card">
        <h3 class="analysis-header">Fundamental Data</h3>
        <div id="fundamentalDetails">
           <p style="color: var(--text-muted); text-align: center; padding: 20px 0;">
            Data will appear here...
          </p>
        </div>
      </div>

    </section>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
